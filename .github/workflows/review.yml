name: PR Review
on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
jobs:
  review:
    if: >-
      (
        github.event_name == 'pull_request' &&
        (
          github.event.pull_request.author_association == 'OWNER' ||
          github.event.pull_request.author_association == 'MEMBER' ||
          github.event.pull_request.author_association == 'COLLABORATOR'
        )
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        startsWith(github.event.comment.body, '/review') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Extract arguments from comment
        id: get_args
        if: github.event_name == 'issue_comment'
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Generate a random EOF marker for the GITHUB_OUTPUT heredoc.
          # This variable is passed to awk which handles all output writing.
          EOF=$(openssl rand -hex 8)

          awk -v eof="$EOF" -v gh_out="$GITHUB_OUTPUT" '
            BEGIN {
              ext = ""
              repo = ""
              com = ""
              section = ""
            }
            /^External:/ { section="ext"; next }
            /^Internal:/ { section="repo"; next }
            /^Comments:/ { section="com"; next }
            { 
              gsub(/\r/, "", $0);
              gsub(/^[ \t]+|[ \t]+$/, "", $0);
              if ($0 == "" || $0 == "/review") { next }

              if (section == "ext") {
                sub(/^- +/, "");
                if (ext != "") { ext = ext "," $0 } else { ext = $0 }
              }
              else if (section == "repo") {
                sub(/^- +/, "");
                if (repo != "") { repo = repo "," $0 } else { repo = $0 }
              }
              else if (section == "com") {
                if (com != "") { com = com "\n" $0 } else { com = $0 }
              }
            }
            END {
              printf "external_refs=%s\n", ext >> gh_out
              printf "repo_context_refs=%s\n", repo >> gh_out
              printf "additional_comments<<%s\n", eof >> gh_out
              printf "%s\n", com >> gh_out
              printf "%s\n", eof >> gh_out
            }
          ' <<< "$COMMENT_BODY"
        shell: bash
      - uses: alexanderlhicks/lean-review-workflow@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          pr_number: ${{ github.event.issue.number || github.event.pull_request.number }}
          external_refs: "${{ steps.get_args.outputs.external_refs }}"
          repo_context_refs: "${{ steps.get_args.outputs.repo_context_refs }}"
          additional_comments: "${{ steps.get_args.outputs.additional_comments }}"
      - name: Post visible review marker
        if: success()
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.issue.number || context.payload.pull_request?.number;

            if (!pull_number) {
              core.setFailed('Could not determine pull request number for review marker.');
              return;
            }

            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const runMarker = `Workflow run: ${runUrl}`;

            const { data: existingReviews } = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            if (existingReviews.some(review => review.body?.includes(runMarker))) {
              core.info(`Review marker already exists for ${runUrl}`);
              return;
            }

            const { data: pull } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number,
            });

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pull_number,
              per_page: 100,
            });

            const botComment = comments
              .filter(comment =>
                comment.user?.type === 'Bot' &&
                (
                  comment.body?.includes('### 🤖 AI Review') ||
                  comment.body?.includes('### 🤖 Initial AI review')
                )
              )
              .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))[0];

            const trigger =
              context.eventName === 'issue_comment' ? 'manual `/review` command' : 'PR synchronize event';

            const body = [
              'Automated AI review refreshed.',
              '',
              `Trigger: ${trigger}`,
              botComment
                ? `Updated review comment: ${botComment.html_url}`
                : 'Updated review comment: bot comment not found',
              runMarker,
              `Head SHA: \`${pull.head.sha}\``,
            ].join('\n');

            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number,
              event: 'COMMENT',
              body,
            });
