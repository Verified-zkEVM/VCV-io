name: Lint Style

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "VCVio/**/*.lean"
      - "FFI/**/*.lean"
      - "LatticeCrypto/**/*.lean"
      - "Examples/**/*.lean"
      - "Interop.lean"
      - "Interop/**/*.lean"
      - "lakefile.lean"
      - "scripts/lint-style.py"
      - "scripts/print-style-errors.sh"
      - "scripts/nolints-style.txt"
      - "scripts/style-exceptions.txt"
      - ".github/workflows/linting.yml"
  push:
    branches: [main]
    paths:
      - "VCVio/**/*.lean"
      - "FFI/**/*.lean"
      - "LatticeCrypto/**/*.lean"
      - "Examples/**/*.lean"
      - "Interop.lean"
      - "Interop/**/*.lean"
      - "lakefile.lean"
      - "scripts/lint-style.py"
      - "scripts/print-style-errors.sh"
      - "scripts/nolints-style.txt"
      - "scripts/style-exceptions.txt"
      - ".github/workflows/linting.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Style
    runs-on: ubuntu-latest

    steps:
      - uses: leanprover-community/lint-style-action@91923b046cc6a468e9ae340f32f8defe586bd08f # 2026-05-12
        with:
          mode: check
